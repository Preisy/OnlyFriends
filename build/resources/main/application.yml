server:
  port: 8080
  servlet:
    context-path: /api

spring:
  datasource:
    username: admin
    password: password
    url: jdbc:mariadb://localhost:3306/OnlyFriends
    driver-class-name: org.mariadb.jdbc.Driver

jpa:
  generate-ddl: true
  properties:
    hibernate:
      ddl-auto: create
      show_sql: true
      dialect: org.hibernate.dialect.MariaDB103Dialect

